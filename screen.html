<div class="max-w-5xl mx-auto px-6 pt-24 pb-16">
    <button onclick="showScreen('home')" class="text-gray-500 hover:text-white text-sm mb-6 flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Back
    </button>
    <h2 class="text-3xl font-bold text-white mb-8">Practice Journal</h2>

    <!-- Stats cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
        <div class="bg-dark-700 border border-gray-800 rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-white" id="pj-today">--</p>
            <p class="text-xs text-gray-500 mt-1">Today</p>
        </div>
        <div class="bg-dark-700 border border-gray-800 rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-white" id="pj-week">--</p>
            <p class="text-xs text-gray-500 mt-1">This Week</p>
        </div>
        <div class="bg-dark-700 border border-gray-800 rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-white" id="pj-total">--</p>
            <p class="text-xs text-gray-500 mt-1">All Time</p>
        </div>
        <div class="bg-dark-700 border border-gray-800 rounded-xl p-4 text-center">
            <p class="text-2xl font-bold text-accent-light" id="pj-songs">--</p>
            <p class="text-xs text-gray-500 mt-1">Songs Practiced</p>
        </div>
    </div>

    <!-- Daily chart -->
    <div class="bg-dark-700 border border-gray-800 rounded-xl p-5 mb-8">
        <h3 class="text-sm font-semibold text-gray-300 mb-4">Last 30 Days</h3>
        <div id="pj-chart" class="flex items-end gap-1 h-32"></div>
    </div>

    <!-- Two columns: top songs + recent -->
    <div class="grid md:grid-cols-2 gap-6">
        <!-- Top songs -->
        <div>
            <h3 class="text-sm font-semibold text-gray-300 mb-3">Most Practiced</h3>
            <div id="pj-top" class="space-y-2"></div>
        </div>

        <!-- Recent sessions -->
        <div>
            <h3 class="text-sm font-semibold text-gray-300 mb-3">Recent Sessions</h3>
            <div id="pj-recent" class="space-y-2"></div>
        </div>
    </div>
</div>
